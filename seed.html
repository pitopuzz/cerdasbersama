<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeder Soal — CerdasBersama</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #faf8f5; color: #1a1714; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .wrap { max-width: 520px; width: 100%; }
    h1 { font-size: 22px; font-weight: 800; color: #d93025; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #7a7168; margin-bottom: 24px; font-weight: 500; }
    .card { background: #fff; border: 1px solid #e8e4dc; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #7a7168; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #e8e4dc; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: #1a1714; margin-bottom: 14px; outline: none; }
    input:focus { border-color: #d93025; }
    .btn { width: 100%; padding: 13px; border-radius: 50px; border: none; background: #d93025; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; transition: background 0.18s; }
    .btn:hover { background: #c12820; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .btn.green { background: #1a7a4a; }
    .btn.gray { background: #7a7168; }
    .status { text-align: center; font-size: 13px; font-weight: 600; margin-top: 10px; padding: 8px; border-radius: 8px; }
    .status.ok { background: #edfaf3; color: #1a7a4a; }
    .status.err { background: #fef2f2; color: #d93025; }
    .status.info { background: #fff8e6; color: #8a5e00; }
    .log { background: #1a1714; border-radius: 12px; padding: 16px; font-family: monospace; font-size: 12px; color: #eef0f5; max-height: 280px; overflow-y: auto; display: none; margin-top: 14px; }
    .log-line { padding: 2px 0; }
    .log-line.ok { color: #3ecf8e; }
    .log-line.err { color: #f76060; }
    .log-line.info { color: #f5c842; }
    #loginSection { display: block; }
    #seedSection { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🌱 Seeder Soal</h1>
  <p class="sub">Login dulu, lalu upload 12 soal sample ke Firestore.</p>

  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <div class="card">
      <label>Email</label>
      <input type="email" id="inputEmail" placeholder="admin@gmail.com" value="test2@gmail.com" />
      <label>Password</label>
      <input type="password" id="inputPassword" placeholder="Password kamu" />
      <button class="btn" id="btnLogin">Login & Lanjutkan</button>
      <div class="status info" id="loginStatus">Masukkan email & password admin.</div>
    </div>
  </div>

  <!-- SEED SECTION -->
  <div id="seedSection">
    <div class="card">
      <div class="status ok" id="userInfo">✅ Login berhasil!</div>
      <br/>
      <button class="btn" id="btnSeed">🚀 Upload 12 Soal ke Firestore</button>
      <div class="status info" style="margin-top:10px" id="seedStatus">Siap dijalankan.</div>
      <div class="log" id="logBox"></div>
    </div>
    <button class="btn gray" id="btnLogout" style="margin-top:8px">Logout</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let firebaseConfig;
  try {
    const mod = await import('./firebase-config.js');
    firebaseConfig = mod.firebaseConfig || mod.default;
  } catch { firebaseConfig = window._fbConfig || {}; }

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const $ = id => document.getElementById(id);

  function log(msg, type = '') {
    $('logBox').style.display = 'block';
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    line.textContent = msg;
    $('logBox').appendChild(line);
    $('logBox').scrollTop = $('logBox').scrollHeight;
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      $('loginSection').style.display = 'none';
      $('seedSection').style.display = 'block';
      $('userInfo').textContent = `✅ Login sebagai: ${user.email}`;
    } else {
      $('loginSection').style.display = 'block';
      $('seedSection').style.display = 'none';
    }
  });

  $('btnLogin').addEventListener('click', async () => {
    const email = $('inputEmail').value.trim();
    const pass = $('inputPassword').value;
    if (!email || !pass) { $('loginStatus').textContent = '⚠️ Isi email dan password dulu.'; return; }
    $('btnLogin').disabled = true;
    $('btnLogin').textContent = 'Logging in...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      $('loginStatus').textContent = '✅ Login berhasil!';
    } catch (err) {
      $('loginStatus').textContent = '❌ ' + (err.code === 'auth/invalid-credential' ? 'Email/password salah.' : err.message);
      $('btnLogin').disabled = false;
      $('btnLogin').textContent = 'Login & Lanjutkan';
    }
  });

  $('btnLogout').addEventListener('click', () => signOut(auth));

  const soalData = [
    { kategori:"TWK", subKategori:"Pancasila", pertanyaan:"Sila keempat Pancasila berbunyi...", opsi:{A:"Ketuhanan Yang Maha Esa",B:"Kemanusiaan yang Adil dan Beradab",C:"Persatuan Indonesia",D:"Kerakyatan yang Dipimpin oleh Hikmat Kebijaksanaan dalam Permusyawaratan/Perwakilan",E:"Keadilan Sosial bagi Seluruh Rakyat Indonesia"}, jawaban:"D", pembahasan:"Sila keempat Pancasila adalah Kerakyatan yang Dipimpin oleh Hikmat Kebijaksanaan dalam Permusyawaratan/Perwakilan.", tingkat:"mudah", isPremium:false, paket:["gratis","starter","value","pro","ultimate","premium"], urutan:1 },
    { kategori:"TWK", subKategori:"UUD 1945", pertanyaan:"Pasal berapa UUD 1945 yang mengatur tentang hak atas pendidikan?", opsi:{A:"Pasal 27",B:"Pasal 28C",C:"Pasal 31",D:"Pasal 33",E:"Pasal 34"}, jawaban:"C", pembahasan:"Pasal 31 UUD 1945 ayat (1) menyatakan bahwa setiap warga negara berhak mendapat pendidikan.", tingkat:"mudah", isPremium:false, paket:["gratis","starter","value","pro","ultimate","premium"], urutan:2 },
    { kategori:"TWK", subKategori:"Nasionalisme", pertanyaan:"Hari Sumpah Pemuda diperingati setiap tanggal...", opsi:{A:"17 Agustus",B:"28 Oktober",C:"20 Mei",D:"10 November",E:"21 April"}, jawaban:"B", pembahasan:"Sumpah Pemuda diperingati setiap 28 Oktober berdasarkan Kongres Pemuda II tahun 1928.", tingkat:"mudah", isPremium:false, paket:["gratis","starter","value","pro","ultimate","premium"], urutan:3 },
    { kategori:"TIU", subKategori:"Aritmatika", pertanyaan:"Jika 3x + 7 = 22, maka nilai x adalah...", opsi:{A:"3",B:"4",C:"5",D:"6",E:"7"}, jawaban:"C", pembahasan:"3x + 7 = 22 → 3x = 15 → x = 5.", tingkat:"mudah", isPremium:false, paket:["gratis","starter","value","pro","ultimate","premium"], urutan:4 },
    { kategori:"TIU", subKategori:"Deret Angka", pertanyaan:"Lanjutan dari deret: 2, 4, 8, 16, ... adalah...", opsi:{A:"24",B:"28",C:"30",D:"32",E:"36"}, jawaban:"D", pembahasan:"Pola deret kelipatan 2. 2→4→8→16→32.", tingkat:"mudah", isPremium:false, paket:["gratis","starter","value","pro","ultimate","premium"], urutan:5 },
    { kategori:"TKP", subKategori:"Integritas", pertanyaan:"Anda menemukan dompet berisi uang dan KTP di toilet kantor. Apa yang Anda lakukan?", opsi:{A:"Mengambil uangnya saja",B:"Menyerahkan ke satpam dan melaporkan ke atasan",C:"Meninggalkan dompet di tempat",D:"Menyimpan dompet sampai ada yang mencari",E:"Mengumumkan di grup WhatsApp kantor"}, jawaban:"B", pembahasan:"Menyerahkan ke satpam dan melapor ke atasan mencerminkan integritas sebagai ASN.", tingkat:"mudah", isPremium:false, paket:["gratis","starter","value","pro","ultimate","premium"], urutan:6 },
    { kategori:"TWK", subKategori:"Ideologi", pertanyaan:"Konsep Bhinneka Tunggal Ika pertama kali muncul dalam kitab...", opsi:{A:"Negarakertagama",B:"Sutasoma",C:"Arjunawiwaha",D:"Pararaton",E:"Ramayana"}, jawaban:"B", pembahasan:"Bhinneka Tunggal Ika dari Kitab Sutasoma karangan Mpu Tantular masa Majapahit.", tingkat:"sedang", isPremium:true, paket:["value","pro","ultimate","premium"], urutan:7 },
    { kategori:"TWK", subKategori:"Sistem Pemerintahan", pertanyaan:"Lembaga negara yang berwenang menguji undang-undang terhadap UUD 1945 adalah...", opsi:{A:"Mahkamah Agung",B:"Komisi Yudisial",C:"Mahkamah Konstitusi",D:"DPR",E:"BPK"}, jawaban:"C", pembahasan:"Mahkamah Konstitusi berwenang judicial review berdasarkan Pasal 24C UUD 1945.", tingkat:"sedang", isPremium:true, paket:["value","pro","ultimate","premium"], urutan:8 },
    { kategori:"TIU", subKategori:"Logika", pertanyaan:"Semua dokter adalah sarjana. Budi adalah sarjana. Kesimpulan yang tepat adalah...", opsi:{A:"Budi pasti dokter",B:"Budi mungkin dokter",C:"Budi bukan dokter",D:"Semua sarjana dokter",E:"Tidak dapat disimpulkan"}, jawaban:"B", pembahasan:"Tidak bisa disimpulkan Budi pasti dokter karena ada sarjana yang bukan dokter.", tingkat:"sedang", isPremium:true, paket:["value","pro","ultimate","premium"], urutan:9 },
    { kategori:"TIU", subKategori:"Verbal", pertanyaan:"ANTONYM dari kata EFISIEN adalah...", opsi:{A:"Cermat",B:"Hemat",C:"Boros",D:"Produktif",E:"Tepat"}, jawaban:"C", pembahasan:"Efisien berarti tepat guna. Antonimnya BOROS.", tingkat:"sedang", isPremium:true, paket:["pro","ultimate","premium"], urutan:10 },
    { kategori:"TKP", subKategori:"Kerja Tim", pertanyaan:"Rekan kerja Anda sering datang terlambat sehingga mengganggu produktivitas tim. Apa yang Anda lakukan?", opsi:{A:"Langsung lapor atasan",B:"Mengabaikan",C:"Bicara langsung secara baik-baik dan pribadi",D:"Membicarakan dengan rekan lain",E:"Mengancam akan melapor"}, jawaban:"C", pembahasan:"Komunikasi langsung dan personal menunjukkan sikap profesional dan empati.", tingkat:"sedang", isPremium:true, paket:["pro","ultimate","premium"], urutan:11 },
    { kategori:"SKB", subKategori:"Manajemen ASN", pertanyaan:"Berdasarkan UU No. 5 Tahun 2014, yang dimaksud merit system adalah...", opsi:{A:"Sistem berdasarkan senioritas",B:"Kebijakan berdasarkan kualifikasi, kompetensi, dan kinerja",C:"Promosi berdasarkan kedekatan pimpinan",D:"Pengelolaan berdasarkan kebutuhan daerah",E:"Rekrutmen berdasarkan afiliasi politik"}, jawaban:"B", pembahasan:"Merit system adalah manajemen ASN berdasarkan kualifikasi, kompetensi, dan kinerja secara adil.", tingkat:"sulit", isPremium:true, paket:["ultimate","premium"], urutan:12 },
  ];

  $('btnSeed').addEventListener('click', async () => {
    $('btnSeed').disabled = true;
    $('btnSeed').textContent = '⏳ Mengupload...';
    $('seedStatus').textContent = 'Sedang upload soal...';
    $('seedStatus').className = 'status info';
    log('🚀 Mulai upload soal ke Firestore...', 'info');

    let sukses = 0;
    for (const soal of soalData) {
      try {
        await addDoc(collection(db, 'soal'), { ...soal, createdAt: serverTimestamp() });
        log(`✅ [${soal.kategori}] ${soal.pertanyaan.substring(0,55)}...`, 'ok');
        sukses++;
      } catch (err) {
        log(`❌ Gagal: ${soal.pertanyaan.substring(0,40)} — ${err.message}`, 'err');
      }
    }

    if (sukses === soalData.length) {
      log(`\n✨ Berhasil upload ${sukses} soal!`, 'ok');
      $('btnSeed').textContent = '✅ Selesai!';
      $('btnSeed').className = 'btn green';
      $('seedStatus').textContent = `✨ ${sukses} soal berhasil diupload!`;
      $('seedStatus').className = 'status ok';
    } else {
      log(`\n⚠️ ${sukses}/${soalData.length} soal berhasil.`, 'info');
      $('seedStatus').textContent = `⚠️ ${sukses}/${soalData.length} berhasil. Coba lagi.`;
      $('seedStatus').className = 'status err';
      $('btnSeed').disabled = false;
      $('btnSeed').textContent = 'Coba Lagi';
    }
  });
</script>
</body>
</html>
